<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klipp Admin – Bestillinger</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f0f11; --surface: #1a1a1e; --card: #222226; --border: rgba(255,255,255,0.08);
      --text: #f0eeea; --muted: #888; --accent: #4a90b8; --warm: #b8956a;
      --pending: #f59e0b; --confirmed: #4caf7d; --cancelled: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; min-height: 100vh; }

    /* LOGIN */
    .login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box { background: var(--surface); border: 1px solid var(--border); padding: 3rem; width: 360px; text-align:center; }
    .login-box h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
    .login-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }
    .login-box input { width:100%; padding: 0.85rem 1rem; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 0.95rem; outline:none; margin-bottom: 0.8rem; transition: border-color 0.2s; }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button { width:100%; padding: 0.9rem; background: var(--accent); color: #fff; border: none; font-size: 0.9rem; letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s; }
    .login-box button:hover { background: #5ba3cc; }
    .login-error { color: #ef4444; font-size: 0.8rem; margin-top: 0.8rem; display:none; }
    .login-error.show { display: block; }

    /* APP */
    .app { display:none; min-height:100vh; }
    .app.visible { display:block; }

    /* HEADER */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .header-left { display:flex; align-items:center; gap:1rem; }
    .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .badge-live { background: rgba(76,175,125,0.15); color: var(--confirmed); font-size: 0.7rem; padding: 0.25rem 0.6rem; border-radius: 99px; letter-spacing: 0.08em; border: 1px solid rgba(76,175,125,0.3); }
    .header-actions { display:flex; align-items:center; gap: 0.8rem; }
    .btn-sm { padding: 0.5rem 1rem; font-size: 0.78rem; letter-spacing: 0.05em; cursor:pointer; transition: 0.2s; border:none; }
    .btn-refresh { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .btn-logout { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-logout:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

    /* STATS */
    .stats { display:grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1.5rem 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 1.2rem 1.5rem; }
    .stat-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform:uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .stat-val { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-val.pending  { color: var(--pending); }
    .stat-val.confirmed { color: var(--confirmed); }
    .stat-val.total    { color: var(--text); }
    .stat-val.today    { color: var(--accent); }

    /* FILTERS */
    .filters { padding: 0 2rem 1rem; display:flex; gap: 0.8rem; flex-wrap:wrap; align-items:center; }
    .filter-label { font-size: 0.75rem; color: var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
    .filter-btn { padding: 0.4rem 1rem; font-size: 0.78rem; background: var(--card); border: 1px solid var(--border); color: var(--muted); cursor:pointer; transition: 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(74,144,184,0.08); }
    .filter-date { padding: 0.4rem 0.8rem; font-size: 0.78rem; background: var(--card); border: 1px solid var(--border); color: var(--text); outline:none; margin-left: auto; }
    .filter-date:focus { border-color: var(--accent); }

    /* TABLE */
    .table-wrap { padding: 0 2rem 2rem; overflow-x:auto; }
    table { width:100%; border-collapse: collapse; }
    thead tr { border-bottom: 2px solid var(--border); }
    th { text-align:left; padding: 0.8rem 1rem; font-size: 0.7rem; letter-spacing: 0.15em; text-transform:uppercase; color: var(--muted); font-weight: 500; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: var(--surface); }
    tbody tr.today-row { background: rgba(74,144,184,0.04); }
    td { padding: 1rem 1rem; font-size: 0.88rem; vertical-align:middle; }

    .td-name { font-weight: 500; }
    .td-contact { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }
    .td-service { font-size: 0.85rem; }
    .td-date { font-size: 0.85rem; }
    .td-time { font-weight: 600; color: var(--accent); font-size: 0.95rem; }
    .td-notes { font-size: 0.78rem; color: var(--muted); max-width: 200px; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; }

    .status-badge { display: inline-flex; align-items:center; gap: 0.35rem; padding: 0.3rem 0.75rem; font-size: 0.72rem; letter-spacing: 0.08em; text-transform:uppercase; font-weight: 500; }
    .status-badge.pending   { background: rgba(245,158,11,0.12); color: var(--pending);  border: 1px solid rgba(245,158,11,0.25); }
    .status-badge.confirmed { background: rgba(76,175,125,0.12); color: var(--confirmed); border: 1px solid rgba(76,175,125,0.25); }
    .status-badge.cancelled { background: rgba(239,68,68,0.1);   color: var(--cancelled); border: 1px solid rgba(239,68,68,0.2); }

    .action-btns { display:flex; gap: 0.4rem; }
    .action-btn { padding: 0.35rem 0.8rem; font-size: 0.72rem; border:none; cursor:pointer; letter-spacing:0.05em; transition: 0.2s; }
    .action-confirm { background: rgba(76,175,125,0.15); color: var(--confirmed); border: 1px solid rgba(76,175,125,0.3); }
    .action-confirm:hover { background: rgba(76,175,125,0.3); }
    .action-cancel  { background: rgba(239,68,68,0.1);  color: var(--cancelled); border: 1px solid rgba(239,68,68,0.2); }
    .action-cancel:hover  { background: rgba(239,68,68,0.2); }

    /* Empty / loading */
    .table-msg { text-align:center; padding: 4rem; color: var(--muted); font-size: 0.9rem; }
    .today-divider { background: rgba(74,144,184,0.06); }
    .today-divider td { padding: 0.4rem 1rem; font-size: 0.7rem; letter-spacing: 0.15em; text-transform:uppercase; color: var(--accent); border: none; }

    /* Toast */
    .toast { position:fixed; bottom: 2rem; right: 2rem; background: var(--card); border: 1px solid var(--border); padding: 1rem 1.5rem; font-size: 0.85rem; opacity:0; transform:translateY(10px); transition: 0.3s; pointer-events:none; z-index:200; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.success { border-color: rgba(76,175,125,0.4); color: var(--confirmed); }
    .toast.error   { border-color: rgba(239,68,68,0.4);  color: var(--cancelled); }

    @media (max-width: 768px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .filters { gap:0.5rem; }
      th:nth-child(5), td:nth-child(5) { display:none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>Klipp<span style="color:var(--accent)">.</span></h1>
    <p>Admin — logg inn for å se bestillinger</p>
    <input type="password" id="pw-input" placeholder="Passord" onkeydown="if(event.key==='Enter')tryLogin()" />
    <button onclick="tryLogin()">Logg inn</button>
    <p class="login-error" id="login-err">Feil passord. Prøv igjen.</p>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <header>
    <div class="header-left">
      <div class="logo">Klipp<span>.</span> Admin</div>
      <span class="badge-live">● Live</span>
    </div>
    <div class="header-actions">
      <span id="last-updated" style="font-size:0.75rem;color:var(--muted)"></span>
      <button class="btn-sm btn-refresh" onclick="loadBookings()">↻ Oppdater</button>
      <button class="btn-sm btn-logout" onclick="logout()">Logg ut</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><p class="stat-label">I dag</p><p class="stat-val today" id="stat-today">—</p></div>
    <div class="stat-card"><p class="stat-label">Venter på svar</p><p class="stat-val pending" id="stat-pending">—</p></div>
    <div class="stat-card"><p class="stat-label">Bekreftet</p><p class="stat-val confirmed" id="stat-confirmed">—</p></div>
    <div class="stat-card"><p class="stat-label">Totalt</p><p class="stat-val total" id="stat-total">—</p></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <span class="filter-label">Vis:</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Venter</button>
    <button class="filter-btn" onclick="setFilter('confirmed', this)">Bekreftet</button>
    <button class="filter-btn" onclick="setFilter('cancelled', this)">Avlyst</button>
    <input type="date" class="filter-date" id="filter-date" onchange="loadBookings()" title="Filtrer på dato" />
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Navn & kontakt</th>
          <th>Tjeneste</th>
          <th>Dato</th>
          <th>Tid</th>
          <th>Kommentar</th>
          <th>Status</th>
          <th>Handlinger</th>
        </tr>
      </thead>
      <tbody id="bookings-tbody">
        <tr><td colspan="7" class="table-msg">Laster bestillinger...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// CONFIG — BYTT UT MED DINE VERDIER
// ════════════════════════════════════════════
const SUPABASE_URL  = 'https://ztcmdasqdcnqvkigjeaj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0Y21kYXNxZGNucXZraWdqZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDA5MTksImV4cCI6MjA4OTU3NjkxOX0.cZi44v3E7mgGlFw_W0CZJWyIluX7CfQhIpnDZltLTi0';
const ADMIN_PASS    = 'Bodøklipp2026'; // f.eks. 'KlippBodo2025!'

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
function tryLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASS) {
    sessionStorage.setItem('klipp-admin', '1');
    showApp();
  } else {
    document.getElementById('login-err').classList.add('show');
    document.getElementById('pw-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('klipp-admin');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-err').classList.remove('show');
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  loadBookings();
  // Auto-refresh every 60 seconds
  setInterval(loadBookings, 60000);
}

// Check if already logged in
if (sessionStorage.getItem('klipp-admin')) showApp();

// ════════════════════════════════════════════
// FILTER STATE
// ════════════════════════════════════════════
let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadBookings();
}

// ════════════════════════════════════════════
// LOAD BOOKINGS
// ════════════════════════════════════════════
async function loadBookings() {
  const tbody = document.getElementById('bookings-tbody');
  tbody.innerHTML = '<tr><td colspan="7" class="table-msg">Henter bestillinger...</td></tr>';

  let query = db.from('bookings').select('*').order('date', {ascending:true}).order('time', {ascending:true});
  if (currentFilter !== 'all') query = query.eq('status', currentFilter);
  const dateFilter = document.getElementById('filter-date').value;
  if (dateFilter) query = query.eq('date', dateFilter);

  const { data, error } = await query;

  if (error) { tbody.innerHTML = `<tr><td colspan="7" class="table-msg" style="color:var(--cancelled)">Feil ved henting: ${error.message}</td></tr>`; return; }
  if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="table-msg">Ingen bestillinger funnet.</td></tr>'; updateStats([]); return; }

  updateStats(data);
  renderTable(data);
  document.getElementById('last-updated').textContent = 'Oppdatert ' + new Date().toLocaleTimeString('no-NO', {hour:'2-digit',minute:'2-digit'});
}

// ════════════════════════════════════════════
// RENDER TABLE
// ════════════════════════════════════════════
function renderTable(rows) {
  const tbody = document.getElementById('bookings-tbody');
  const todayStr = new Date().toISOString().split('T')[0];
  const mo = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  const weekdays = ['Søn','Man','Tir','Ons','Tor','Fre','Lør'];

  let html = '';
  let lastDate = '';

  rows.forEach(r => {
    const isToday = r.date === todayStr;
    const d = new Date(r.date);
    const dateLabel = `${weekdays[d.getDay()]} ${d.getDate()}. ${mo[d.getMonth()]}`;

    if (r.date !== lastDate) {
      const label = isToday ? `📅 I dag – ${dateLabel}` : dateLabel;
      html += `<tr class="today-divider"><td colspan="7">${label}</td></tr>`;
      lastDate = r.date;
    }

    const statusMap = { pending: 'Venter', confirmed: 'Bekreftet', cancelled: 'Avlyst' };
    const confirmBtn = r.status !== 'confirmed'
      ? `<button class="action-btn action-confirm" onclick="updateStatus('${r.id}','confirmed')">✓ Bekreft</button>` : '';
    const cancelBtn = r.status !== 'cancelled'
      ? `<button class="action-btn action-cancel" onclick="updateStatus('${r.id}','cancelled')">✕ Avlys</button>` : '';
    const pendingBtn = (r.status !== 'pending' && r.status !== 'cancelled')
      ? `<button class="action-btn" style="background:rgba(245,158,11,0.1);color:var(--pending);border:1px solid rgba(245,158,11,0.3)" onclick="updateStatus('${r.id}','pending')">↩ Venter</button>` : '';

    const notesCell = r.notes
      ? `<span title="${r.notes}">${r.notes}</span>` : `<span style="color:var(--border)">—</span>`;

    html += `
      <tr class="${isToday ? 'today-row' : ''}">
        <td>
          <div class="td-name">${r.name}</div>
          <div class="td-contact">
            <a href="tel:${r.phone}" style="color:var(--accent);text-decoration:none;">📞 ${r.phone}</a>
            ${r.email ? `<br><a href="mailto:${r.email}" style="color:var(--muted);text-decoration:none;">✉ ${r.email}</a>` : ''}
          </div>
        </td>
        <td class="td-service">${r.service}</td>
        <td class="td-date">${dateLabel}</td>
        <td class="td-time">${r.time}</td>
        <td class="td-notes">${notesCell}</td>
        <td><span class="status-badge ${r.status}">${statusMap[r.status]||r.status}</span></td>
        <td><div class="action-btns">${confirmBtn}${cancelBtn}${pendingBtn}</div></td>
      </tr>`;
  });

  tbody.innerHTML = html;
}

// ════════════════════════════════════════════
// UPDATE STATUS
// ════════════════════════════════════════════
async function updateStatus(id, status) {
  const { error } = await db.from('bookings').update({ status }).eq('id', id);
  if (error) { showToast('Feil: ' + error.message, 'error'); return; }
  const labels = { confirmed: 'Bestilling bekreftet ✓', cancelled: 'Bestilling avlyst', pending: 'Satt tilbake til venter' };
  showToast(labels[status] || 'Oppdatert', 'success');
  loadBookings();
}

// ════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════
function updateStats(rows) {
  const todayStr = new Date().toISOString().split('T')[0];
  document.getElementById('stat-today').textContent     = rows.filter(r => r.date === todayStr && r.status !== 'cancelled').length;
  document.getElementById('stat-pending').textContent   = rows.filter(r => r.status === 'pending').length;
  document.getElementById('stat-confirmed').textContent = rows.filter(r => r.status === 'confirmed').length;
  document.getElementById('stat-total').textContent     = rows.filter(r => r.status !== 'cancelled').length;
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
